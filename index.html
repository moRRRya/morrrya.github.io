<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moRRya: QUANTITATIVE CAPITAL & ECONOMICS</title>
    <style>
        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #12161f;
            --accent-blue: #0070f3;
            --accent-glow: #00f0ff;
            --text-main: #f4f6f8;
            --text-muted: #8b949e;
            --border-color: #21262d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background-color: rgba(10, 12, 16, 0.9);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Responsive Navbar Logo Integration */
        .logo {
            display: flex;
            align-items: center;
            height: 40px;
            width: auto;
        }

        .logo svg {
            height: 100%;
            width: auto;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-glow);
        }

        /* Hero and Mathematical Blueprint Layout */
        .hero {
            padding: 9rem 2rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 2.5rem;
        }

        .hero-blueprint {
            width: 100%;
            max-width: 750px;
            margin: 0 auto 3rem;
            display: block;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-secondary);
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto 6rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .dashboard-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .simulator-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .control-group {
            background: rgba(255,255,255,0.02);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .control-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .control-group select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        .output-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .allocation-bars h3, .metrics h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bar-container {
            margin-bottom: 1rem;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .bar-fill-bg {
            background: var(--bg-primary);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 33.3%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .metric-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .metric-card span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .metric-card p {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-glow);
        }

        .table-section {
            max-width: 1200px;
            margin: 0 auto 6rem;
            padding: 0 2rem;
        }

        .table-section h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(255,255,255,0.02);
            color: var(--text-muted);
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .highlight-row {
            background-color: rgba(0, 112, 243, 0.05);
            color: var(--accent-glow);
            font-weight: bold;
        }

        footer {
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
            padding: 3rem 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <!-- BRAND LOGO SYSTEM INTEGRATION -->
            <div class="logo">
                <svg xmlns="http://w3.org" viewBox="0 -15 380 120">
                    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800">
                        <text x="10" y="65" font-size="52" fill="#f4f6f8" letter-spacing="-2">mo</text>
                        <text x="85" y="65" font-size="56" fill="#00f0ff" font-weight="900" letter-spacing="-2">R</text>
                        <text x="128" y="65" font-size="56" fill="#00f0ff" font-weight="900" letter-spacing="-1">R</text>
                        <text x="172" y="65" font-size="52" fill="#f4f6f8" letter-spacing="-2">ya</text>
                        <text x="232" y="65" font-size="20" font-weight="400" fill="#8b949e" letter-spacing="1">.quant</text>
                    </g>
                </svg>
            </div>
            <div class="nav-links">
                <a href="#architecture">Architecture</a>
                <a href="#simulator">Live Terminal</a>
                <a href="#backtest">Performance</a>
            </div>
        </div>
    </header>
