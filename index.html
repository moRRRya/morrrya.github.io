<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Update Demo</title>
  <style>
    /* Dark background for the whole page */
    body {
      background-color: #1e1e1e;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    /* Terminal window box */
    .terminal {
      width: 500px;
      max-width: 90%;
      background-color: #000000;
      border: 1px solid #333;
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Top bar of the terminal */
    .terminal-header {
      background-color: #222;
      padding: 10px;
      display: flex;
      align-items: center;
    }

    /* Fake window control dots */
    .buttons {
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: #ff5f56;
      border-radius: 50%;
      box-shadow: 20px 0 0 #ffbd2e, 40px 0 0 #27c93f;
    }

    .title {
      color: #999;
      margin-left: 50px;
      font-size: 14px;
    }

    /* Inside the terminal window */
    .terminal-body {
      padding: 20px;
      color: #00ff00; /* Classic green terminal text */
      font-size: 16px;
      line-height: 1.5;
      min-height: 150px;
    }

    /* Prompt color styling */
    .prompt {
      color: #00aaff;
    }

    /* Action button below terminal */
    .update-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #00aaff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .update-btn:hover {
      background-color: #0088cc;
    }
  </style>
</head>
<body>

  <!-- 1. The Terminal Interface -->
  <div class="terminal">
    <div class="terminal-header">
      <span class="buttons"></span>
      <span class="title">bash</span>
    </div>
    <div id="terminal-body" class="terminal-body">
      <div><span class="prompt">user@machine:~$</span> Old text line one...</div>
      <div><span class="prompt">user@machine:~$</span> Old text line two...</div>
    </div>
  </div>

  <!-- 2. Trigger Button -->
  <button class="update-btn" onclick="updateTerminalContent()">Update Content Completely</button>

  <!-- 3. The Logic to Wipe and Replace Content -->
  <script>
    function updateTerminalContent() {
      // Find the inner terminal area
      const terminalBody = document.getElementById('terminal-body');
      
      // Paste your new HTML copy inside these backticks (``)
      terminalBody.innerHTML = `
        <div><span class="prompt">user@machine:~$</span> Clear terminal command received...</div>
        <div style="color: #ffbd2e;">[System updated successfully]</div>
        <div><span class="prompt">user@machine:~$</span> Welcome to the new screen!</div>
      `;
    }
  </script>

</body>
</html>
